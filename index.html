<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vietnam On Top</title>

<style>
body{font-family:Arial;margin:0;background:#111;color:white}
#auth,#main,#teamRoom{padding:20px}
input,button,select{padding:8px;margin:5px}
button{cursor:pointer}
#chatBox{height:250px;overflow-y:auto;background:#222;padding:10px;margin-top:10px}
.msg{margin:5px 0}
#adminPanel{background:#222;padding:15px;margin-top:20px}
#teamRoom{display:none}
.teamTitle{font-size:30px;font-weight:bold;text-align:center}
.dev{font-size:16px;text-align:center;margin-bottom:20px;color:gold}
.profileBox{background:#222;padding:10px;margin-bottom:15px}
.verified{
  width:18px;
  vertical-align:middle;
}
</style>
</head>
<body>

<div id="auth">
<h2>Đăng nhập / Đăng ký</h2>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>
<button onclick="register()">Đăng ký</button>
<button onclick="login()">Đăng nhập</button>
</div>

<div id="main" style="display:none;">

<h2>Chọn Đội</h2>
<select id="teamSelect"></select>
<button onclick="enterTeam()">Vào Đội</button>

</div>

<div id="teamRoom">

<div class="teamTitle">Vietnam On Top</div>
<div class="dev">Developer: Vietnam Chat Hub</div>

<button onclick="leaveTeam()">⬅ Back</button>
<button onclick="logout()">Đăng xuất</button>

<div class="profileBox">
<h3>Hồ sơ</h3>
<div id="profileInfo"></div>
</div>

<h3>Chat</h3>
<div id="chatBox"></div>
<input type="text" id="message" placeholder="Nhập tin nhắn">
<button onclick="sendMessage()">Gửi</button>

<div id="adminPanel" style="display:none;">
<h3>ADMIN PANEL</h3>
<input type="text" id="banWord" placeholder="hack">
<input type="text" id="banReason" placeholder="Lý do">
<button onclick="setBan()">Lưu Auto Ban</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,signOut,onAuthStateChanged,setPersistence,browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase,ref,set,push,onValue,get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyCvKaa4S4icydrj2JYA5ch0ckGC_mT0bvc",
authDomain:"vietnamontop-77401.firebaseapp.com",
databaseURL:"https://vietnamontop-77401-default-rtdb.firebaseio.com",
projectId:"vietnamontop-77401",
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
await setPersistence(auth,browserLocalPersistence);
const db=getDatabase(app);

const ADMIN_UID="o4WlbBoDRbPOTvbg69juPM7Iq0s1";
const DEVELOPER_UID="o4WlbBoDRbPOTvbg69juPM7Iq0s1";

const authDiv=document.getElementById("auth");
const mainDiv=document.getElementById("main");
const teamRoom=document.getElementById("teamRoom");
const teamSelect=document.getElementById("teamSelect");
const chatBox=document.getElementById("chatBox");
const profileInfo=document.getElementById("profileInfo");
const adminPanel=document.getElementById("adminPanel");

let currentTeam=null;

for(let i=1;i<=500;i++){
  const option=document.createElement("option");
  option.value="Team "+i;
  option.textContent="Team "+i;
  teamSelect.appendChild(option);
}

window.register=async()=>{
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;
const userCred=await createUserWithEmailAndPassword(auth,email,password);
const user=userCred.user;
await set(ref(db,"users/"+user.uid),{
email:user.email,
role:user.uid===ADMIN_UID?"admin":"user"
});
alert("Đăng ký thành công");
}

window.login=async()=>{
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;
await signInWithEmailAndPassword(auth,email,password);
}

window.logout=async()=>{await signOut(auth);}

onAuthStateChanged(auth,(user)=>{
if(user){
authDiv.style.display="none";
mainDiv.style.display="block";
}else{
authDiv.style.display="block";
mainDiv.style.display="none";
teamRoom.style.display="none";
}
});

window.enterTeam=()=>{
currentTeam=teamSelect.value;
mainDiv.style.display="none";
teamRoom.style.display="block";
loadProfile();
loadChat();
}

window.leaveTeam=()=>{
teamRoom.style.display="none";
mainDiv.style.display="block";
chatBox.innerHTML="";
}

function loadProfile(){
const user=auth.currentUser;
profileInfo.innerHTML="";
let html=`ID: ${user.uid}<br>Email: ${user.email}`;

if(user.uid===ADMIN_UID || user.uid===DEVELOPER_UID){
html+=` <img class="verified" src="https://upload.wikimedia.org/wikipedia/commons/e/e4/Twitter_Verified_Badge.svg">`;
adminPanel.style.display="block";
}

profileInfo.innerHTML=html;
}

function loadChat(){
onValue(ref(db,"teams/"+currentTeam+"/chat"),(snapshot)=>{
chatBox.innerHTML="";
snapshot.forEach(child=>{
const msg=child.val();
const div=document.createElement("div");
div.textContent=msg.email+": "+msg.text;
chatBox.appendChild(div);
});
chatBox.scrollTop=chatBox.scrollHeight;
});
}

window.sendMessage=async()=>{
const user=auth.currentUser;
const text=document.getElementById("message").value;
if(!text)return;
await push(ref(db,"teams/"+currentTeam+"/chat"),{
email:user.email,
text:text
});
document.getElementById("message").value="";
}

window.setBan=async()=>{
const word=document.getElementById("banWord").value;
const reason=document.getElementById("banReason").value;
await set(ref(db,"autoBan"),{word,reason});
alert("Saved");
}

</script>
</body>
</html>
