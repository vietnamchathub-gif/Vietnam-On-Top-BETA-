<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vietnam On Top 🇻🇳 [BETA]</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #111;
  color: white;
}

header {
  background: red;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

nav {
  display: flex;
  justify-content: space-around;
  background: #222;
  padding: 10px;
}

nav button {
  background: none;
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.section {
  display: none;
  padding: 20px;
}

.active {
  display: block;
}

.card {
  background:#222;
  padding:15px;
  margin-bottom:15px;
  border-radius:8px;
}
</style>
</head>

<body>

<header>Vietnam On Top 🇻🇳 [BETA]</header>

<nav>
  <button onclick="showSection('home')">🏠 Trang chủ</button>
  <button onclick="showSection('confess')">💬 Tâm sự</button>
  <button onclick="showSection('premium')">👑 Premium</button>
  <button onclick="showSection('profile')">👤 Hồ sơ</button>
</nav>

<div id="home" class="section active">
  <h2>🔥 Trang Chủ</h2>

  <div class="card">
    <h3>📢 Thông báo</h3>
    <p>Chào mừng bạn đến với Vietnam On Top 🇻🇳 [BETA]</p>
  </div>

  <button onclick="showSection('confess')"
    style="width:100%;padding:12px;background:red;border:none;color:white;font-size:16px;border-radius:8px;">
    💬 Vào khu vực Tâm sự
  </button>
</div>

<div id="premium" class="section">
  <h2>👑 Premium</h2>
  <div class="card">Chưa mở.</div>
</div>

<div id="profile" class="section">
  <h2>👤 Hồ sơ</h2>
  <div class="card">Chưa có dữ liệu.</div>
</div>

<div id="confess" class="section">
  <h2>💬 Chat Cộng Đồng</h2>

  <div id="chatBox" style="margin-top:10px;"></div>

  <input type="text" id="chatInput" placeholder="Nhập tin nhắn..."
    style="width:100%;padding:8px;border-radius:6px;border:none;margin-top:10px;">

  <button onclick="sendMessage()"
    style="margin-top:8px;padding:8px 15px;background:red;color:white;border:none;border-radius:6px;">
    Gửi
  </button>
</div>

<script>
function showSection(id) {
  var sections = document.querySelectorAll('.section');
  sections.forEach(function(section) {
    section.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, push, onValue }
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCvKaa4S4icydrj2JVA5ch0ckGC_mT0bvc",
  authDomain: "vietnamontop-77401.firebaseapp.com",
  databaseURL: "https://vietnamontop-77401-default-rtdb.firebaseio.com",
  projectId: "vietnamontop-77401",
  storageBucket: "vietnamontop-77401.firebasestorage.app",
  messagingSenderId: "89611948481",
  appId: "1:89611948481:web:1116769713da2629d5f40",
  measurementId: "G-43ZEERKCBZ"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

window.sendMessage = function() {
  const input = document.getElementById("chatInput");
  const message = input.value.trim();
  if(message === "") return;

  push(ref(database, "messages"), {
    text: message,
    time: Date.now()
  });

  input.value = "";
};

const messagesRef = ref(database, "messages");
onValue(messagesRef, (snapshot) => {
  const chatBox = document.getElementById("chatBox");
  chatBox.innerHTML = "";

  snapshot.forEach((childSnapshot) => {
    const data = childSnapshot.val();
    const div = document.createElement("div");
    div.style.background = "#1e1e1e";
    div.style.padding = "8px";
    div.style.marginTop = "5px";
    div.style.borderRadius = "6px";
    div.innerText = data.text;
    chatBox.appendChild(div);
  });
});
</script>

</body>
</html>
