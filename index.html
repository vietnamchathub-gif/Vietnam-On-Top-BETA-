<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vietnam On Top</title>
<style>
body{font-family:Arial;margin:0;background:#0b3d91;color:white}
.header{background:red;padding:12px;text-align:center;font-weight:bold}
.box{padding:15px}
button{padding:8px 12px;border:none;border-radius:6px;margin-top:5px}
.red{background:#b30000;color:white;width:100%}
.green{background:green;color:white;width:100%}
.admin-panel{background:#092c66;padding:10px;margin-top:20px;border-radius:10px}
</style>
</head>
<body>

<div class="header">🇻🇳 Vietnam On Top 🇻🇳</div>

<div class="box">

<h3>Hồ sơ</h3>
<p id="profile"></p>

<div>
<h3>🌟 Premium [ĐẶC QUYỀN]</h3>
<p id="premiumInfo"></p>
<button id="premiumBtn"></button>
</div>

<div id="adminPanel"></div>

</div>

<script>
const ADMIN_ID = "55VD4pQJIFu1fvacjl_wY2KBjzl2";

// Giả lập user hiện tại
let currentUser = {
  username:"Admin App",
  uid:"55VD4pQJIFu1fvacjl_wY2KBjzl2",
  premium:false,
  banned:false,
  kicked:false
};

// ===== BAN CHECK =====
if(localStorage.getItem("banned_"+currentUser.uid) === "true"){
  document.body.innerHTML="<h2 style='color:red;text-align:center;margin-top:50px'>🚫 Bạn đã vi phạm chính sách của chúng tôi.</h2>";
}

// ===== KICK CHECK =====
if(sessionStorage.getItem("kick_"+currentUser.uid)==="true"){
  document.body.innerHTML="<h2 style='color:orange;text-align:center;margin-top:50px'>⚠️ [Data] Hệ thống phát hiện phiên dùng khả nghi.<br>Bạn đã bị đá khỏi phiên sử dụng.<br><br>Vui lòng mở lại ứng dụng.</h2>";
}

// ===== PROFILE =====
function renderProfile(){
  let tag="";
  let idDisplay=currentUser.uid;

  if(currentUser.uid===ADMIN_ID){
      tag=" 🛡";
      idDisplay="Administrator";
  }

  document.getElementById("profile").innerHTML=
  "Tên: "+currentUser.username+tag+"<br>"+
  "ID: "+idDisplay;
}

// ===== PREMIUM =====
function renderPremium(){
  const info=document.getElementById("premiumInfo");
  const btn=document.getElementById("premiumBtn");

  if(currentUser.uid===ADMIN_ID){
      info.innerHTML="Giá: FREE (Admin)<br>Hạn: Vĩnh viễn<br>Đặc quyền: Toàn quyền hệ thống";
      btn.innerText="Nhận Premium (FREE)";
      btn.className="green";
      btn.onclick=function(){
          alert("🎉 Đã Mua Premium thành công (Admin Free)");
          currentUser.premium=true;
      };
  } else {
      info.innerHTML="Giá: 99.000 VNĐ / 30 ngày<br>Đặc quyền: Badge + Ưu tiên";
      btn.innerText="Nhà Phát Hành chưa kích hoạt mở bán Premium [ĐẶC QUYỀN]";
      btn.className="red";
      btn.onclick=function(){
          alert("❌ Premium chưa mở bán");
      };
  }
}

// ===== ADMIN PANEL =====
function renderAdmin(){
  if(currentUser.uid!==ADMIN_ID) return;

  document.getElementById("adminPanel").innerHTML=`
  <div class="admin-panel">
  <h3>🛡 ADMIN PANEL</h3>
  <button class="red" onclick="banUser()">Ban User</button>
  <button class="red" onclick="kickUser()">Kick User</button>
  </div>
  `;
}

function banUser(){
  let target=prompt("Nhập UID cần BAN:");
  if(!target) return;
  if(target===ADMIN_ID){
      alert("❌ Không thể ban ADMIN");
      return;
  }
  localStorage.setItem("banned_"+target,"true");
  alert("🚫 Đã BAN vĩnh viễn UID: "+target);
}

function kickUser(){
  let target=prompt("Nhập UID cần KICK:");
  if(!target) return;
  if(target===ADMIN_ID){
      alert("❌ Không thể kick ADMIN");
      return;
  }
  sessionStorage.setItem("kick_"+target,"true");
  alert("⚠️ Đã Kick phiên UID: "+target);
}

renderProfile();
renderPremium();
renderAdmin();

</script>
</body>
</html>
