<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vietnam On Top</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"></script>

<style>
body{font-family:Arial;background:#0a1f44;color:white;text-align:center;margin:0}
input,button{padding:8px;margin:5px;border-radius:5px;border:none}
button{cursor:pointer}
.teamBtn{display:block;width:90%;margin:5px auto;background:#1e3c72;color:white}
.chatBox{height:200px;overflow:auto;background:white;color:black;margin:10px}
.adminBox{background:#132d63;padding:10px;margin:10px;border-radius:10px}
.redNotice{border:2px solid red;color:red;padding:10px;margin:10px}
.backBtn{background:orange}
</style>
</head>
<body>

<h2>🇻🇳 Vietnam On Top 🇻🇳</h2>

<div id="authSection">
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Mật khẩu"><br>
<button onclick="register()">Đăng ký</button>
<button onclick="login()">Đăng nhập</button>
</div>

<div id="appSection" style="display:none">

<button onclick="logout()">Đăng xuất</button>

<!-- PROFILE -->
<div class="adminBox">
<h3>👤 Hồ sơ</h3>
<p id="profileInfo"></p>
</div>

<!-- TEAM LIST -->
<div id="teamList"></div>

<!-- CHAT -->
<div id="chatSection" style="display:none">
<button class="backBtn" onclick="back()">← Back</button>
<h3 id="teamTitle"></h3>
<div class="chatBox" id="chatBox"></div>
<div id="chatInputArea">
<input id="msgInput" placeholder="Nhập tin nhắn">
<button onclick="sendMsg()">Gửi</button>
</div>
</div>

<!-- PREMIUM -->
<div class="adminBox">
<h3>⭐ Premium</h3>
<p>Giá: 49.000đ / 30 ngày</p>
<p>Đặc quyền: ⭐ Biểu tượng VIP</p>
<button onclick="buyPremium()">Mua Premium</button>
<div id="premiumNotice"></div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="adminBox" style="display:none">
<h3>🛡 ADMIN PANEL</h3>
<button onclick="banPrompt()">BAN USER</button>
<button onclick="kickPrompt()">KICK USER</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set, push, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "THAY_CONFIG",
authDomain: "THAY",
databaseURL: "THAY",
projectId: "THAY",
storageBucket: "THAY",
messagingSenderId: "THAY",
appId: "THAY"
};

const ADMIN_UID="o4WlbBoDRbPOTvbg69juPM7Iq0s1";

const app=initializeApp(firebaseConfig);
const auth=getAuth();
const db=getDatabase();

let currentTeam=null;
let currentRole="user";

window.register=()=>{
createUserWithEmailAndPassword(auth,email.value,password.value)
.then(user=>{
set(ref(db,"users/"+user.user.uid),{
role:"user",
banned:false,
premium:false
});
});
};

window.login=()=>{
signInWithEmailAndPassword(auth,email.value,password.value);
};

window.logout=()=>signOut(auth);

onAuthStateChanged(auth,user=>{
if(user){

get(ref(db,"users/"+user.uid)).then(snap=>{
let data=snap.val();

if(data?.banned){
alert("Bạn đã bị BAN");
logout();
return;
}

currentRole=data?.role || "user";

authSection.style.display="none";
appSection.style.display="block";

loadProfile(user);
loadTeams();

if(user.uid===ADMIN_UID){
currentRole="admin";
adminPanel.style.display="block";
}

});
}else{
authSection.style.display="block";
appSection.style.display="none";
}
});

function loadProfile(user){

if(user.uid===ADMIN_UID){
profileInfo.innerHTML=
"🔱 ADMIN TỐI CAO<br>Quyền: Quản lý toàn hệ thống<br>Chat trong đội: KHÔNG<br>Chat cộng đồng: CÓ";
return;
}

if(currentRole==="staff"){
profileInfo.innerHTML=
"🛡 STAFF<br>Quyền: Kiểm duyệt<br>Chat trong đội: KHÔNG<br>Chat cộng đồng: CÓ";
return;
}

profileInfo.innerHTML=
"👤 USER<br>Email: "+user.email+
"<br>UID: "+user.uid+
"<br>Chat trong đội: CÓ";
}

function loadTeams(){
teamList.innerHTML="";
for(let i=1;i<=20;i++){
let btn=document.createElement("button");
btn.className="teamBtn";
btn.innerText="Đội "+i;
btn.onclick=()=>openTeam("team"+i);
teamList.appendChild(btn);
}
}

function openTeam(team){
currentTeam=team;
teamList.style.display="none";
chatSection.style.display="block";
teamTitle.innerText=team;

onValue(ref(db,"messages/"+team),snap=>{
chatBox.innerHTML="";
snap.forEach(child=>{
let data=child.val();
chatBox.innerHTML+=`<div>${data.text}</div>`;
});
});

if(currentRole==="admin" || currentRole==="staff"){
chatInputArea.style.display="none";
}else{
chatInputArea.style.display="block";
}
}

window.sendMsg=()=>{
push(ref(db,"messages/"+currentTeam),{
text:msgInput.value
});
msgInput.value="";
};

window.back=()=>{
chatSection.style.display="none";
teamList.style.display="block";
};

window.banPrompt=()=>{
let uid=prompt("Nhập UID cần BAN:");
if(uid){
set(ref(db,"users/"+uid+"/banned"),true);
alert("Đã BAN");
}
};

window.kickPrompt=()=>{
let uid=prompt("Nhập UID cần KICK:");
if(uid && currentTeam){
get(ref(db,"messages/"+currentTeam)).then(snap=>{
snap.forEach(child=>{
if(child.val().uid===uid){
remove(ref(db,"messages/"+currentTeam+"/"+child.key));
}
});
alert("Đã KICK");
});
}
};

window.buyPremium=()=>{
premiumNotice.innerHTML=
`<div class="redNotice">
Premium [ĐẶC QUYỀN] này chưa được Nhà Phát Hành bán trên ứng dụng
</div>`;
};

</script>

</body>
</html>
