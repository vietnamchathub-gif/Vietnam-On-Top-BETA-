<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vietnam On Top 🇻🇳 [BETA]</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #111;
  color: white;
}

header {
  background: red;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

nav {
  display: flex;
  justify-content: space-around;
  background: #222;
  padding: 10px;
}

nav button {
  background: none;
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.section {
  display: none;
  padding: 20px;
}

.active {
  display: block;
}
</style>
</head>

<body>

<header>Vietnam On Top 🇻🇳 [BETA]</header>

<nav>
  <button onclick="showSection('home')">🏠 Trang chủ</button>
  <button onclick="showSection('confess')">💬 Tâm sự</button>
  <button onclick="showSection('premium')">👑 Premium</button>
  <button onclick="showSection('profile')">👤 Hồ sơ</button>
</nav>

<div id="home" class="section active">
  <h2>Trang chủ</h2>
  <p>Chào mừng đến Vietnam On Top!</p>
</div>

<div id="confess" class="section">
  <h2>Khu vực Tâm sự</h2>
  <p>Nơi đăng bài ẩn danh.</p>
</div>

<div id="premium" class="section">
  <h2>Premium</h2>
  <p>Mở khóa tính năng đặc biệt.</p>
</div>

<div id="profile" class="section">
  <h2>Hồ sơ</h2>
  <p>Thông tin tài khoản của bạn.</p>
</div>

<script>
function showSection(id) {
  var sections = document.querySelectorAll('.section');
  sections.forEach(function(section) {
    section.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
