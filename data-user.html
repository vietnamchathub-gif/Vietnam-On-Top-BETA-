<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Data User System</title>

<style>
body{
  margin:0;
  background:#0f1117;
  color:white;
  font-family:Segoe UI, Arial, sans-serif;
}

.header{
  background:#1b1f2a;
  padding:20px;
  font-size:28px;
  font-weight:800;
  border-bottom:2px solid #2b2f3a;
}

.container{
  padding:30px;
}

.card{
  background:#1b1f2a;
  padding:20px;
  border-radius:12px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#252a36;
  padding:12px;
  text-align:left;
}

td{
  padding:12px;
  border-bottom:1px solid #2a2f3a;
}

tr:hover{
  background:#222733;
}

button{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  font-weight:600;
  cursor:pointer;
  margin-right:5px;
}

.unban{ background:#2e8bff; color:white; }
.delete{ background:#ff3b3b; color:white; }

.status{
  margin-bottom:20px;
  font-weight:600;
}
</style>
</head>

<body>

<div class="header">DATA USER SYSTEM</div>

<div class="container">
<div class="card">
<div id="status" class="status">Đang kiểm tra quyền...</div>
<div id="list"></div>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const ADMIN_UID = "o4WlbBoDRbPOTvbg69juPM7Iq0s1";

const firebaseConfig = {
  apiKey: "AIzaSyCvKaa4S4icydrj2JYA5ch0ckGC_mT0bvc",
  authDomain: "vietnamontop-77401.firebaseapp.com",
  databaseURL: "https://vietnamontop-77401-default-rtdb.firebaseio.com",
  projectId: "vietnamontop-77401",
  storageBucket: "vietnamontop-77401.firebasestorage.app",
  messagingSenderId: "89611948481",
  appId: "1:89611948481:web:0106f02e15f429679d5f40"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const statusDiv = document.getElementById("status");
const listDiv = document.getElementById("list");

onAuthStateChanged(auth, (user) => {

  if(!user){
    statusDiv.innerHTML = "❌ Bạn chưa đăng nhập";
    return;
  }

  if(user.uid !== ADMIN_UID){
    statusDiv.innerHTML = "⛔ Bạn không phải ADMIN";
    return;
  }

  statusDiv.innerHTML = "✔ ADMIN hợp lệ";

  const usersRef = ref(db, "users");

  onValue(usersRef, (snapshot) => {

    if(!snapshot.exists()){
      listDiv.innerHTML = "Không có user";
      return;
    }

    const data = snapshot.val();

    let html = `
    <table>
      <tr>
        <th>UID</th>
        <th>Email</th>
        <th>Premium</th>
        <th>Banned</th>
        <th>Action</th>
      </tr>
    `;

    Object.keys(data).forEach(uid => {

      const u = data[uid];

      html += `
      <tr>
        <td>${uid}</td>
        <td>${u.email || ""}</td>
        <td>${u.premium || false}</td>
        <td>${u.banned || false}</td>
        <td>
          <button class="unban" onclick="window.unbanUser('${uid}')">UNBAN</button>
          <button class="delete" onclick="window.deleteUser('${uid}')">DELETE</button>
        </td>
      </tr>
      `;
    });

    html += "</table>";
    listDiv.innerHTML = html;

  });

});

window.unbanUser = async function(uid){
  await update(ref(db, "users/" + uid), { banned:false });
  alert("Đã mở khóa");
};

window.deleteUser = async function(uid){
  if(!confirm("Bạn chắc chắn muốn xóa user này?")) return;
  await remove(ref(db, "users/" + uid));
  alert("Đã xóa user");
};

</script>

</body>
</html>
